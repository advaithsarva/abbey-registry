<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – Saint Martin's Abbey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Full-page centered login layout */
    body {
      background: #2a1a0e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .login-box {
      background: var(--bg);
      padding: 3rem 2.5rem;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      border: 1px solid rgba(139,96,64,.35);
      outline: 3px solid rgba(139,96,64,.12);
      outline-offset: -1px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo h1 {
      font-family: var(--font-head);
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text);
      margin: 0 0 .25rem;
    }
    .login-logo p {
      font-family: var(--font-ui);
      font-size: .7rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .login-logo .cross {
      font-size: 2rem;
      display: block;
      margin-bottom: .75rem;
      color: var(--accent);
    }

    .login-box .form-group {
      margin-bottom: 1.2rem;
    }
    .login-box label {
      display: block;
      font-family: var(--font-ui);
      font-size: .7rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .45rem;
    }
    .login-box input {
      width: 100%;
      padding: .8rem 1rem;
      border: 1px solid rgba(0,0,0,.12);
      background: white;
      font-family: var(--font-body);
      font-size: .95rem;
      color: var(--text);
      outline: none;
      box-sizing: border-box;
      transition: border-color .2s;
    }
    .login-box input:focus {
      border-color: var(--accent);
    }

    .login-btn {
      width: 100%;
      padding: .9rem;
      background: var(--accent);
      color: white;
      border: none;
      cursor: pointer;
      font-family: var(--font-ui);
      font-size: .75rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      font-weight: 600;
      transition: background .2s;
      margin-top: .5rem;
    }
    .login-btn:hover { background: #7a5235; }
    .login-btn:disabled { opacity: .6; cursor: not-allowed; }

    .login-error {
      background: #fdecea;
      border-left: 3px solid #c0392b;
      padding: .75rem 1rem;
      font-family: var(--font-ui);
      font-size: .82rem;
      color: #c0392b;
      margin-bottom: 1.2rem;
      display: none;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-family: var(--font-ui);
      font-size: .75rem;
      color: var(--muted);
      text-decoration: none;
    }
    .back-link:hover { color: var(--accent); }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="login-logo">
      <span class="cross">✝</span>
      <h1>Saint Martin's Abbey</h1>
      <p>Admin Panel</p>
    </div>

    <!-- Error message shown if credentials are wrong -->
    <div class="login-error" id="login-error"></div>

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="" autocomplete="username">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="" autocomplete="current-password">
    </div>

    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In</button>

    <a href="index.html" class="back-link">← Back to the website</a>
  </div>

  <div id="toast"></div>
  <script src="js/api.js"></script>
  <script>
    // ----------------------------------------------------------------
    // Login — send credentials to the server, store token if correct
    // ----------------------------------------------------------------
    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorBox = document.getElementById('login-error');
      const btn      = document.getElementById('login-btn');

      // Hide any previous error
      errorBox.style.display = 'none';

      // Require both fields
      if (!username || !password) {
        errorBox.textContent  = 'Please enter both username and password.';
        errorBox.style.display = 'block';
        return;
      }

      // Disable the button while logging in
      btn.textContent = 'Signing in…';
      btn.disabled    = true;

      try {
        // Send credentials to the backend
        const response = await fetch('http://localhost:3000/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password })
        });
        const result = await response.json();

        if (result.success) {
          // Save the token to localStorage so admin.js can use it
          localStorage.setItem('abbey_admin_token', result.token);
          // Go to the admin dashboard
          window.location.href = 'admin.html';
        } else {
          errorBox.textContent  = result.error || 'Login failed.';
          errorBox.style.display = 'block';
        }

      } catch (err) {
        errorBox.textContent  = 'Could not reach the server. Is it running?';
        errorBox.style.display = 'block';
      } finally {
        btn.textContent = 'Sign In';
        btn.disabled    = false;
      }
    }

    // Allow pressing Enter in the password field to log in
    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });

    // If already logged in, skip straight to admin
    if (localStorage.getItem('abbey_admin_token')) {
      window.location.href = 'admin.html';
    }
  </script>
</body>
</html>
